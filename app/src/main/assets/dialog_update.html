<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>发现新版本</title>
    <style>
        :root {
            --primary: #5b67f0;
            --primary-soft: #eef0ff;
            --bg: #f7f8fc;
            --card: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --line: #e5e7eb;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0;
            background: transparent;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text-main);
        }
        body { padding: 16px; }
        .dialog {
            background: var(--bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 22px; font-weight: 700; }
        .close-btn {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #fff;
            color: var(--text-sub);
            font-size: 20px;
        }
        .content {
            padding: 0 20px 20px;
            max-height: 62vh;
            overflow-y: auto;
        }
        .version-card {
            background: var(--primary-soft);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            display: flex;
            gap: 12px;
        }
        .version-item { flex: 1; }
        .label { font-size: 12px; color: var(--text-sub); }
        .value {
            margin-top: 6px;
            font-size: 17px;
            font-weight: 800;
            word-break: break-word;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(229, 231, 235, 0.7);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
        }
        .body {
            white-space: pre-wrap;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.7;
            word-break: break-word;
        }
        .footer {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            border: none;
            border-radius: 18px;
            height: 46px;
            font-size: 15px;
            font-weight: 700;
        }
        .btn-secondary { background: #fff; color: var(--text-sub); }
        .btn-primary { background: var(--primary); color: #fff; }
    </style>
</head>
<body>
<div class="dialog">
    <div class="header">
        <div class="title">发现新版本</div>
        <button class="close-btn" type="button" onclick="closeDialog()">×</button>
    </div>
    <div class="content">
        <div class="version-card">
            <div class="version-item">
                <div class="label">当前版本</div>
                <div id="currentVersion" class="value">-</div>
            </div>
            <div class="version-item">
                <div class="label">最新版本</div>
                <div id="latestVersion" class="value">-</div>
            </div>
        </div>
        <div class="card">
            <div class="label">更新说明</div>
            <div id="releaseBody" class="body">-</div>
        </div>
    </div>
    <div class="footer">
        <button class="btn btn-secondary" type="button" onclick="closeDialog()">稍后再说</button>
        <button class="btn btn-primary" type="button" onclick="openRelease()">去下载</button>
    </div>
</div>
<script>
    function closeDialog() {
        if (window.UpdateDialogHost && typeof window.UpdateDialogHost.close === "function") {
            window.UpdateDialogHost.close();
        }
    }

    function openRelease() {
        if (window.UpdateDialogHost && typeof window.UpdateDialogHost.openRelease === "function") {
            window.UpdateDialogHost.openRelease();
        }
    }

    window.UpdateDialog = {
        render(raw) {
            const data = JSON.parse(raw);
            document.getElementById("currentVersion").textContent = data.currentVersion || "-";
            document.getElementById("latestVersion").textContent = data.latestVersion || "-";
            document.getElementById("releaseBody").textContent = data.body || "暂无更新说明";
        }
    };

    document.addEventListener("DOMContentLoaded", function () {
        if (window.UpdateDialogHost && typeof window.UpdateDialogHost.onPageReady === "function") {
            window.UpdateDialogHost.onPageReady();
        }
    });
</script>
</body>
</html>
