<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>权限说明</title>
    <style>
        :root {
            --primary: #5b67f0;
            --primary-soft: #eef0ff;
            --bg: #f7f8fc;
            --card: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --line: #e5e7eb;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0;
            background: transparent;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text-main);
        }
        body { padding: 16px; }
        .dialog {
            background: var(--bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 22px;
            font-weight: 700;
        }
        .close-btn {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #fff;
            color: var(--text-sub);
            font-size: 20px;
        }
        .content {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .intro {
            margin: 0;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.7;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(229, 231, 235, 0.7);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
        }
        .label {
            font-size: 12px;
            color: var(--text-sub);
        }
        .value {
            margin-top: 6px;
            font-size: 16px;
            font-weight: 700;
        }
        .desc {
            margin-top: 8px;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.7;
        }
        .btn {
            margin-top: 14px;
            border: none;
            border-radius: 14px;
            padding: 13px 14px;
            font-size: 14px;
            font-weight: 700;
        }
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 14px 28px rgba(91, 103, 240, 0.24);
        }
        .btn-secondary {
            width: 100%;
            background: #eef2f7;
            color: var(--text-main);
        }
        .btn[hidden] {
            display: none;
        }
    </style>
</head>
<body>
<div class="dialog">
    <div class="header">
        <div class="title">权限说明</div>
        <button class="close-btn" type="button" onclick="closeDialog()">×</button>
    </div>
    <div class="content">
        <p class="intro">项目运行需要触摸注入权限与悬浮窗权限。</p>

        <div class="card">
            <div class="label">权限模式</div>
            <div id="privilegeValue" class="value">-</div>
            <div class="desc">Root 可直接使用；无 Root 时使用 Shizuku 触摸注入链路。</div>
            <button id="grantPrivilegeBtn" class="btn btn-primary" type="button" onclick="grantPrivilege()">授权 Shizuku</button>
        </div>

        <div class="card">
            <div class="label">悬浮窗权限</div>
            <div id="overlayValue" class="value">-</div>
            <div class="desc">用于显示悬浮球、设置面板和检测框覆盖层。</div>
            <button id="grantOverlayBtn" class="btn btn-secondary" type="button" onclick="grantOverlay()">前往授权悬浮窗</button>
        </div>
    </div>
</div>
<script>
    function closeDialog() {
        if (window.PermissionHost && typeof window.PermissionHost.close === "function") {
            window.PermissionHost.close();
        }
    }

    function grantPrivilege() {
        if (window.PermissionHost && typeof window.PermissionHost.grantPrivilege === "function") {
            window.PermissionHost.grantPrivilege();
        }
    }

    function grantOverlay() {
        if (window.PermissionHost && typeof window.PermissionHost.grantOverlay === "function") {
            window.PermissionHost.grantOverlay();
        }
    }

    window.PermissionDialog = {
        render(raw) {
            const data = JSON.parse(raw);
            document.getElementById("privilegeValue").textContent = data.privilegeValue || "-";
            document.getElementById("overlayValue").textContent = data.overlayValue || "-";
            document.getElementById("grantPrivilegeBtn").hidden = !data.canGrantPrivilege;
            document.getElementById("grantOverlayBtn").hidden = !data.canGrantOverlay;
        }
    };

    document.addEventListener("DOMContentLoaded", function () {
        if (window.PermissionHost && typeof window.PermissionHost.onPageReady === "function") {
            window.PermissionHost.onPageReady();
        }
    });
</script>
</body>
</html>
