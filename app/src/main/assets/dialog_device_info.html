<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>设备信息</title>
    <style>
        :root {
            --primary: #5b67f0;
            --bg: #f7f8fc;
            --card: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0;
            background: transparent;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text-main);
        }
        body { padding: 16px; }
        .dialog {
            background: var(--bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 22px;
            font-weight: 700;
        }
        .close-btn {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #fff;
            color: var(--text-sub);
            font-size: 20px;
        }
        .content {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(229, 231, 235, 0.7);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
        }
        .label {
            font-size: 12px;
            color: var(--text-sub);
        }
        .value {
            margin-top: 6px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.6;
            word-break: break-word;
        }
        .desc {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.7;
        }
    </style>
</head>
<body>
<div class="dialog">
    <div class="header">
        <div class="title">设备信息</div>
        <button class="close-btn" type="button" onclick="closeDialog()">×</button>
    </div>
    <div class="content">
        <div class="card">
            <div class="label">Android 版本</div>
            <div id="androidVersion" class="value">-</div>
        </div>
        <div class="card">
            <div class="label">设备</div>
            <div id="deviceName" class="value">-</div>
            <div id="deviceExtra" class="desc">-</div>
        </div>
        <div class="card">
            <div class="label">应用版本</div>
            <div id="appVersion" class="value">-</div>
        </div>
    </div>
</div>
<script>
    function closeDialog() {
        if (window.DeviceInfoHost && typeof window.DeviceInfoHost.close === "function") {
            window.DeviceInfoHost.close();
        }
    }

    window.DeviceInfoDialog = {
        render(raw) {
            const data = JSON.parse(raw);
            document.getElementById("androidVersion").textContent = data.androidVersion || "-";
            document.getElementById("deviceName").textContent = data.deviceName || "-";
            document.getElementById("deviceExtra").textContent = data.deviceExtra || "-";
            document.getElementById("appVersion").textContent = data.appVersion || "-";
        }
    };

    document.addEventListener("DOMContentLoaded", function () {
        if (window.DeviceInfoHost && typeof window.DeviceInfoHost.onPageReady === "function") {
            window.DeviceInfoHost.onPageReady();
        }
    });
</script>
</body>
</html>
